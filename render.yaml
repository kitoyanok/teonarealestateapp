databases:
  - name: estateflow-db
    databaseName: estateflow
    user: estateflow

services:
  - type: web
    name: teona-realestate-app
    runtime: docker
    dockerfilePath: ./Dockerfile.render
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: estateflow-db
          property: connectionString
