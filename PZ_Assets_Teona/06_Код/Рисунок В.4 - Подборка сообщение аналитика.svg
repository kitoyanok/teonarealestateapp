<text x="50" y="1258" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  39  export function buildShareMessage(client: ShareClient, shortlist: ShortlistWithProperty[]) {</text>
<text x="50" y="1278" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  40    const greetingName = firstName(client.name);</text>
<text x="50" y="1298" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  41    const isHouse = client.propertyType === &quot;house&quot;;</text>
<text x="50" y="1318" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  42    const intro = isHouse ? &quot;несколько домов&quot; : &quot;несколько вариантов&quot;;</text>
<text x="50" y="1338" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  43  </text>
<text x="50" y="1358" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  44    const lines = [</text>
<text x="50" y="1378" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  45      `${greetingName}, добрый день!`,</text>
<text x="50" y="1398" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  46      &quot;&quot;,</text>
<text x="50" y="1418" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  47      `Подобрал для вас ${intro}:`,</text>
<text x="50" y="1438" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  48      &quot;&quot;</text>
<text x="50" y="1458" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  49    ];</text>
<text x="50" y="1478" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  50  </text>
<text x="50" y="1498" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  51    shortlist.forEach((item, index) =&gt; {</text>
<text x="50" y="1518" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  52      const property = item.property;</text>
<text x="50" y="1538" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  53      const title = property.title || property.complexName || property.settlementName || &quot;Объект недвижимости&quot;;</text>
<text x="50" y="1558" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  54      const details = isHouse</text>
<text x="50" y="1578" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  55        ? [</text>
<text x="50" y="1598" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  56            property.houseArea ? `${Number(property.houseArea)} м²` : null,</text>
<text x="50" y="1618" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  57            property.landArea ? `участок ${Number(property.landArea)} соток` : null,</text>
<text x="50" y="1638" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  58            formatRub(property.price)</text>
<text x="50" y="1658" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  59          ].filter(Boolean).join(&quot;, &quot;)</text>
<text x="50" y="1678" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  60        : [</text>
<text x="50" y="1698" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  61            property.rooms ? `${property.rooms}-комн.` : null,</text>
<text x="50" y="1718" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  62            property.area ? `${Number(property.area)} м²` : null,</text>
<text x="50" y="1738" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  63            formatRub(property.price)</text>
<text x="50" y="1758" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  64          ].filter(Boolean).join(&quot;, &quot;);</text>
<text x="50" y="1778" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  65  </text>
<text x="50" y="1798" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  66      lines.push(`${index + 1}. ${title}`);</text>
<text x="50" y="1818" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  67      lines.push(details);</text>
<text x="50" y="1838" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  68      lines.push(`Ссылка: ${property.sourceUrl}`);</text>
<text x="50" y="1858" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  69      lines.push(&quot;&quot;);</text>
<text x="50" y="1878" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  70    });</text>
<text x="50" y="1898" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  71  </text>
<text x="50" y="1918" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb">  72    lines.push(&quot;Если какой-то вариант понравится, можем подробнее разобрать условия.&quot;);</text>
