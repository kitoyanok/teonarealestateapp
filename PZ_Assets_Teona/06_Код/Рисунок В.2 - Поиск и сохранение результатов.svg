<text x="50" y="1130" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 159  </text>
<text x="50" y="1150" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 160      if (!response.ok) {</text>
<text x="50" y="1170" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 161        throw new Error(`Search service returned ${response.status}`);</text>
<text x="50" y="1190" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 162      }</text>
<text x="50" y="1210" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 163  </text>
<text x="50" y="1230" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 164      // Payload - это просто пакет данных, который вернул Python-сервис поиска.</text>
<text x="50" y="1250" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 165      const payload = (await response.json()) as SearchResponse;</text>
<text x="50" y="1270" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 166      if (payload.status !== &quot;ok&quot;) {</text>
<text x="50" y="1290" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 167        throw new Error(payload.error ?? &quot;Search service error&quot;);</text>
<text x="50" y="1310" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 168      }</text>
<text x="50" y="1330" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 169  </text>
<text x="50" y="1350" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 170      let saved = 0;</text>
<text x="50" y="1370" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 171      for (const item of payload.items.filter((property) =&gt; property.sourceUrl)) {</text>
<text x="50" y="1390" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 172        const property = (await upsertProperty(cleanItem(item))) as PropertyRef;</text>
<text x="50" y="1410" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 173        await upsertClientFoundProperty(client.id, property.id, item);</text>
<text x="50" y="1430" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 174        saved += 1;</text>
<text x="50" y="1450" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 175      }</text>
<text x="50" y="1470" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 176  </text>
<text x="50" y="1490" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 177      const status = saved &gt; 0 ? &quot;found&quot; : &quot;no_results&quot;;</text>
<text x="50" y="1510" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 178      await finishSearchRun(searchRun.id, payload.totalFound, saved);</text>
<text x="50" y="1530" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 179      await updateClientStatus(client.id, status);</text>
<text x="50" y="1550" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 180  </text>
<text x="50" y="1570" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 181      return { totalFound: payload.totalFound, totalSaved: saved, status };</text>
<text x="50" y="1590" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 182    } catch (error) {</text>
<text x="50" y="1610" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 183      const message = error instanceof Error ? error.message : &quot;Unknown search error&quot;;</text>
<text x="50" y="1630" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 184      await failSearchRun(searchRun.id, message);</text>
<text x="50" y="1650" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 185      await updateClientStatus(client.id, &quot;error&quot;);</text>
<text x="50" y="1670" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 186      return { totalFound: 0, totalSaved: 0, status: &quot;error&quot;, error: message };</text>
<text x="50" y="1690" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 187    }</text>
