<text x="50" y="850" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 145  </text>
<text x="50" y="870" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 146    const searchRun = (await createSearchRun(client.id, client.propertyType)) as SearchRunRef;</text>
<text x="50" y="890" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 147    await updateClientStatus(client.id, &quot;searching&quot;);</text>
<text x="50" y="910" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 148  </text>
<text x="50" y="930" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 149    try {</text>
<text x="50" y="950" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 150      const controller = new AbortController();</text>
<text x="50" y="970" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 151      const timeout = setTimeout(() =&gt; controller.abort(), 20000);</text>
<text x="50" y="990" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 152      const response = await fetch(`${config.searchServiceUrl}/search`, {</text>
<text x="50" y="1010" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 153        method: &quot;POST&quot;,</text>
<text x="50" y="1030" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 154        headers: { &quot;Content-Type&quot;: &quot;application/json&quot; },</text>
