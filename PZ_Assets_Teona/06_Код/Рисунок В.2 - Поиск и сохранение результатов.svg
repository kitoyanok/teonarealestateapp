<text x="50" y="750" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 140  export async function runClientSearch(clientId: string, realtorId: string) {</text>
<text x="50" y="770" font-family="Menlo, Consolas, monospace" font-size="14" fill="#e5e7eb"> 141    const client = (await getClientForSearch(clientId, realtorId)) as SearchClient | null;</text>
