<svg xmlns="http://www.w3.org/2000/svg" width="1560" height="980" viewBox="0 0 1560 980">
<rect x="0" y="0" width="1560" height="980" fill="#ffffff"/>

        <defs>
          <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#374151" />
          </marker>
          <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
            <path d="M0,0 L0,6 L9,3 z" fill="#fd6000" />
          </marker>
        </defs>
        
<text x="80" y="70" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" fill="#202124" text-anchor="start">Диаграмма состояний клиентской заявки</text>
<circle cx="110" cy="287" r="20" fill="#fff1e8" stroke="#fd6000" stroke-width="2"/>
<text x="110" y="293" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="400" fill="#202124" text-anchor="middle">start</text>
<rect x="160" y="250" width="180" height="82" rx="22" ry="22" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="250" y="298" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#202124" text-anchor="middle">new</text>
<rect x="430" y="250" width="220" height="82" rx="22" ry="22" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="540" y="298" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#202124" text-anchor="middle">searching</text>
<rect x="760" y="140" width="180" height="82" rx="22" ry="22" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="850" y="188" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#202124" text-anchor="middle">found</text>
<rect x="760" y="340" width="220" height="82" rx="22" ry="22" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="870" y="388" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#202124" text-anchor="middle">no_results</text>
<rect x="760" y="560" width="180" height="82" rx="22" ry="22" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="850" y="608" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#202124" text-anchor="middle">error</text>
<rect x="1090" y="250" width="260" height="82" rx="22" ry="22" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="1220" y="298" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#202124" text-anchor="middle">shortlist_ready</text>
<rect x="1390" y="250" width="140" height="82" rx="22" ry="22" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="1460" y="298" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="700" fill="#202124" text-anchor="middle">sent</text>
<line x1="130" y1="287" x2="160" y2="287" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
<line x1="250" y1="331" x2="452" y2="291" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
<text x="395" y="277" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="middle">создание клиента и запуск поиска</text>
<line x1="560" y1="331" x2="782" y2="181" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
<text x="695" y="222" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="middle">saved &gt; 0</text>
<line x1="560" y1="331" x2="782" y2="381" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
<text x="705" y="322" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="middle">saved = 0</text>
<line x1="560" y1="331" x2="782" y2="601" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
<text x="695" y="432" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="middle">ошибка сервиса или таймаут</text>
<line x1="850" y1="221" x2="1112" y2="291" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1035" y="222" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="middle">объект добавлен в подборку</text>
<line x1="1260" y1="331" x2="782" y2="181" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1035" y="222" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="middle">последний объект удален из подборки</text>
<line x1="1260" y1="331" x2="1412" y2="291" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
<text x="1340" y="277" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="middle">выполнена mark-sent</text>
<line x1="780" y1="181" x2="630" y2="211" stroke="#fd6000" stroke-width="2" marker-end="url(#arrowAccent)"/>
<text x="590" y="116" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#fd6000" text-anchor="middle">повторный запуск поиска</text>
<line x1="830" y1="371" x2="580" y2="331" stroke="#fd6000" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowAccent)"/>
<text x="560" y="346" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#fd6000" text-anchor="middle">изменены параметры и поиск запущен повторно</text>
<line x1="820" y1="577" x2="560" y2="357" stroke="#fd6000" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowAccent)"/>
<text x="560" y="548" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#fd6000" text-anchor="middle">повторный запуск после сбоя</text>
<line x1="1410" y1="375" x2="610" y2="375" stroke="#fd6000" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrowAccent)"/>
<text x="1020" y="420" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#fd6000" text-anchor="middle">повторный поиск по той же карточке</text>
<rect x="1050" y="520" width="430" height="180" rx="16" ry="16" fill="#f8fafc" stroke="#d1d5db" stroke-width="2"/>
<text x="1070" y="560" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#202124" text-anchor="start">Пояснение по состояниям</text>
<text x="1070" y="595" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6b7280" text-anchor="start">new — карточка создана, поиск еще не</text>
<text x="1070" y="617" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6b7280" text-anchor="start">завершен.</text>
<text x="1070" y="639" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6b7280" text-anchor="start">found — есть хотя бы один сохраненный</text>
<text x="1070" y="661" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6b7280" text-anchor="start">объект.</text>
<text x="1070" y="683" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6b7280" text-anchor="start">no_results — поиск завершен без</text>
<text x="1070" y="705" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6b7280" text-anchor="start">сохраненных объектов.</text>
<text x="1070" y="727" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6b7280" text-anchor="start">error — search-service завершился ошибкой.</text>
<text x="1070" y="749" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6b7280" text-anchor="start">shortlist_ready — в подборке есть хотя бы</text>
<text x="1070" y="771" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6b7280" text-anchor="start">один объект.</text>
<text x="1070" y="793" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#6b7280" text-anchor="start">sent — риелтор отметил отправку подборки.</text>
<line x1="40" y1="938" x2="1520" y2="938" stroke="#d1d5db" stroke-width="1"/>
<text x="780" y="966" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="600" fill="#202124" text-anchor="middle">Рисунок 7 – Диаграмма состояний клиентской заявки</text>
</svg>