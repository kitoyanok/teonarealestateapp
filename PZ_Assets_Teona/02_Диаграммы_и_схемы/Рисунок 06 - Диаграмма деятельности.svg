<text x="1250" y="698" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">Подтвердить запись</text>
<text x="1250" y="717" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">клиента и профиля</text>
<rect x="470" y="790" width="240" height="84" rx="14" ry="14" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="490" y="828" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">Создать search_run и</text>
<text x="490" y="847" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">статус searching</text>
