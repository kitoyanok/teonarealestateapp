<text x="870" y="828" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">Принять запрос поиска</text>
<text x="870" y="847" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">по профилю клиента</text>
<rect x="850" y="920" width="240" height="84" rx="14" ry="14" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="870" y="958" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">Выбрать SourceConfig и</text>
<text x="870" y="977" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">стартовые URL</text>
