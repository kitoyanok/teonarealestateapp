<text x="870" y="1088" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">Загрузить HTML, JSON-</text>
<text x="870" y="1107" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">LD и карточки</text>
<text x="870" y="1126" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">объявлений</text>
<polygon points="970,1180 1090,1235 970,1290 850,1235" fill="#fff7ed" stroke="#fd6000" stroke-width="2"/>
<text x="896" y="1224" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#202124" text-anchor="start">Есть price,</text>
<text x="896" y="1242" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#202124" text-anchor="start">sourceUrl и тип</text>
<text x="896" y="1260" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#202124" text-anchor="start">объекта?</text>
<polygon points="970,1320 1090,1375 970,1430 850,1375" fill="#fff7ed" stroke="#fd6000" stroke-width="2"/>
<text x="896" y="1364" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#202124" text-anchor="start">Объект относится</text>
<text x="896" y="1382" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#202124" text-anchor="start">к Краснодару или</text>
<text x="896" y="1400" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#202124" text-anchor="start">району города?</text>
<rect x="850" y="1460" width="240" height="84" rx="14" ry="14" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="870" y="1498" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">Нормализовать,</text>
<text x="870" y="1517" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">рассчитать matchScore</text>
<text x="870" y="1536" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">и причины</text>
<rect x="470" y="1460" width="240" height="84" rx="14" ry="14" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="490" y="1498" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">Сохранить property и</text>
<text x="490" y="1517" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">client_found_property</text>
<rect x="1230" y="1460" width="240" height="84" rx="14" ry="14" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="1250" y="1498" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">Зафиксировать</text>
<text x="1250" y="1517" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">total_found,</text>
<text x="1250" y="1536" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">total_saved и</text>
<text x="1250" y="1555" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">завершение</text>
