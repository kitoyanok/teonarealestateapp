<text x="516" y="544" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#202124" text-anchor="start">Данные формы</text>
<text x="516" y="562" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="400" fill="#202124" text-anchor="start">корректны?</text>
<rect x="470" y="660" width="240" height="84" rx="14" ry="14" fill="#ffffff" stroke="#374151" stroke-width="2"/>
<text x="490" y="698" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="400" fill="#202124" text-anchor="start">Сохранить clients и</text>
