<text x="446" y="1392" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700" fill="#dc2626" text-anchor="start">по географии</text>
<rect x="1200" y="930" width="270" height="120" rx="14" ry="14" fill="#f8fafc" stroke="#d1d5db" stroke-width="2"/>
<text x="1220" y="968" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#202124" text-anchor="start">Параллельно внутри сервиса:</text>
<text x="1220" y="998" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">поиск картинок, очистка</text>
<text x="1220" y="1016" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">описания, выделение района,</text>
<text x="1220" y="1034" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">цены, площади, этажа,</text>
<text x="1220" y="1052" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">отделки</text>
<rect x="1200" y="1188" width="270" height="112" rx="14" ry="14" fill="#f8fafc" stroke="#d1d5db" stroke-width="2"/>
<text x="1220" y="1226" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#202124" text-anchor="start">Исключения поиска:</text>
<text x="1220" y="1256" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">таймаут источника, пустая</text>
<text x="1220" y="1274" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">выдача, ошибка адаптера,</text>
<text x="1220" y="1292" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">некорректный JSON-LD</text>
<rect x="470" y="1188" width="240" height="108" rx="14" ry="14" fill="#f8fafc" stroke="#d1d5db" stroke-width="2"/>
<text x="490" y="1226" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700" fill="#202124" text-anchor="start">Итог по заявке:</text>
<text x="490" y="1256" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">found, no_results или</text>
<text x="490" y="1274" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">error в зависимости от</text>
<text x="490" y="1292" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">total_saved и</text>
<text x="490" y="1310" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">результата вызова</text>
<text x="490" y="1328" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="400" fill="#6b7280" text-anchor="start">сервиса</text>
